<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Mini Notes</title>
    <style>
        .wrap{max-width:600px;margin:20px auto;}
        textarea{width:100%;height:80px}
        .item{border:1px solid #ccc;padding:8px;margin:5px 0}
        #summary{margin-top:15px;padding:10px;background:#f5f5f5}
    </style>
</head>

<body>
<div class="wrap">
    <h3>简易笔记</h3>

    <textarea id="inputNote"></textarea>
    <br>

    <button id="saveBtn">保存笔记</button>
    <button id="summaryBtn">Summarize 总结全部笔记</button>

    <h4>笔记列表</h4>
    <div id="noteListBox"></div>

    <h4>总结结果</h4>
    <div id="summary"></div>
</div>

<!-- ❗只引入 bundle -->
<script type="module" src="./main.js"></script>
</body>
</html>
